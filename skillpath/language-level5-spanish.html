<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel 5 de Idioma - SkillPath</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px; }
    h1 { text-align: center; }
    .question { font-size: 20px; font-weight: bold; margin: 20px 0; }
    .answer { font-size: 18px; margin: 8px 0; }
    button { padding: 10px 20px; font-size: 18px; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>Nivel 5 de Idioma - Español</h1>

  <div class="question">1. How do you say 'computer' in Spanish?</div>
  <div class="answer">
    <label><input type="radio" name="q1" value="Correct"> Computadora</label><br>
    <label><input type="radio" name="q1" value="Incorrect"> Televisión</label><br>
    <label><input type="radio" name="q1" value="Incorrect"> Silla</label>
  </div>

  <div class="question">2. How do you say 'library' in Spanish?</div>
  <div class="answer">
    <label><input type="radio" name="q2" value="Correct"> Biblioteca</label><br>
    <label><input type="radio" name="q2" value="Incorrect"> Cocina</label><br>
    <label><input type="radio" name="q2" value="Incorrect"> Oficina</label>
  </div>

  <div class="question">3. How do you say 'airplane' in Spanish?</div>
  <div class="answer">
    <label><input type="radio" name="q3" value="Correct"> Avión</label><br>
    <label><input type="radio" name="q3" value="Incorrect"> Tren</label><br>
    <label><input type="radio" name="q3" value="Incorrect"> Barco</label>
  </div>

  <div class="question">4. How do you say 'city' in Spanish?</div>
  <div class="answer">
    <label><input type="radio" name="q4" value="Correct"> Ciudad</label><br>
    <label><input type="radio" name="q4" value="Incorrect"> Pueblo</label><br>
    <label><input type="radio" name="q4" value="Incorrect"> Casa</label>
  </div>

  <button onclick="submitAnswers()">Submit</button>

  <script>
    function submitAnswers() {
      const correctAnswers = [
        document.querySelector('input[name="q1"]:checked')?.value === 'Correct',
        document.querySelector('input[name="q2"]:checked')?.value === 'Correct',
        document.querySelector('input[name="q3"]:checked')?.value === 'Correct',
        document.querySelector('input[name="q4"]:checked')?.value === 'Correct',
      ];

      const numCorrect = correctAnswers.filter(Boolean).length;

      if (numCorrect >= 3) {
        alert("¡Felicidades! Has pasado este nivel.");
        window.location.href = "language-level6-spanish.html"; // Redirect to next level
      } else {
        alert("Lo siento, no pasaste. ¡Inténtalo de nuevo!");
      }
    }
  </script>

</body>
</html>
